services:
  cloudflared-panel:
    build: .
    container_name: cloudflared-panel
    restart: unless-stopped
    ports:
      - "${PANEL_PORT:-8090}:8090"
    environment:
      - PORT=8090
      - DATA_DIR=/data
      - TUNNEL_ORIGIN_CERT=${TUNNEL_ORIGIN_CERT:-}
    volumes:
      - panel_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CLOUDFLARED_CONFIG_DIR:-/etc/cloudflared}:/etc/cloudflared
      - ${HOME_BASE:-/home}:/home:ro
    # Optional: mount host cloudflared credentials
    # - /home/msquad/.cloudflared:/home/msquad/.cloudflared:ro

volumes:
  panel_data:
